<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Віталій Дячук | Fullstack Developer & Mentor</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link id="theme-css" rel="stylesheet" href="./themes/cyberpunk.css" />
</head>

<body>
  <div id="app"></div>

  <script src="./content.js"></script>

  <script>
    const app = document.getElementById("app");

    const el = (tag, className = "", html = "") => {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (html) node.innerHTML = html;
      return node;
    };

    function renderHero(block) {
      const section = el("section", "section hero");

      section.innerHTML = `
        <div class="container hero-grid">
          <div class="hero-copy">
            <p class="eyebrow">${block.label}</p>

            <h1>${block.title}</h1>

            <p class="lead">${block.text}</p>

            <div class="actions">
              ${block.actions.map(a => `
                <a class="btn ${a.variant || ""}" href="${a.url}" target="_blank">
                  ${a.label}
                </a>
              `).join("")}
            </div>
          </div>

          <div class="hero-card">
            <img src="${block.image}" alt="${block.imageAlt}">

            <div class="code-card">
              <pre>${block.code}</pre>
            </div>
          </div>
        </div>
      `;

      return section;
    }

    function renderCards(block) {
      const section = el("section", "section");

      section.innerHTML = `
        <div class="container">
          <p class="eyebrow">${block.label || ""}</p>

          <h2>${block.title}</h2>

          ${block.text ? `<p class="section-text">${block.text}</p>` : ""}

          <div class="cards">
            ${block.items.map(item => `
              <article class="card">
                ${item.kicker ? `<p class="card-kicker">${item.kicker}</p>` : ""}
                <h3>${item.title}</h3>
                <p>${item.text}</p>
              </article>
            `).join("")}
          </div>
        </div>
      `;

      return section;
    }

    function renderStats(block) {
      const section = el("section", "section section-accent");

      section.innerHTML = `
        <div class="container">
          <p class="eyebrow">${block.label}</p>

          <h2>${block.title}</h2>

          <p class="section-text">${block.text}</p>

          <div class="stats">
            ${block.items.map(item => `
              <div class="stat">
                <strong>${item.value}</strong>
                <span>${item.label}</span>
              </div>
            `).join("")}
          </div>
        </div>
      `;

      return section;
    }

    function renderText(block) {
      const section = el("section", "section");

      section.innerHTML = `
        <div class="container narrow">
          <p class="eyebrow">${block.label}</p>
          <h2>${block.title}</h2>
          <p class="lead">${block.text}</p>
        </div>
      `;

      return section;
    }

    function renderCTA(block) {
      const section = el("section", "section");

      section.innerHTML = `
        <div class="container">
          <div class="cta">
            <h2>${block.title}</h2>
            <p>${block.text}</p>

            <a class="btn primary" href="${block.action.url}" target="_blank">
              ${block.action.label}
            </a>
          </div>
        </div>
      `;

      return section;
    }

    const renderers = {
      hero: renderHero,
      cards: renderCards,
      stats: renderStats,
      text: renderText,
      cta: renderCTA
    };

    function renderSite(data) {
      app.innerHTML = "";

      data.blocks.forEach(block => {
        const render = renderers[block.type];

        if (!render) return;

        app.appendChild(render(block));
      });
    }

    if (typeof siteContent !== "undefined") {
      renderSite(siteContent);
    } else {
      console.error("siteContent не знайдено. Перевір, що content.js підключений перед inline-скриптом.");
    }
  </script>
</body>
</html>
